<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>手动发送预览</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark" aria-hidden="true">W</span><div><p class="eyebrow">发送前检查</p><h1>手动发送预览</h1></div></div>
      <nav class="nav-links"><a href="/">返回仪表盘</a><a href="/configuration">配置中心</a></nav>
    </header>
    {% if error %}<p class="error" role="alert">{{ error }}</p>{% else %}
    <section class="hero"><p class="eyebrow">报告主题</p><h1>{{ subject }}</h1><p>请检查内容是否符合预期。确认后任务将进入 Worker 发送队列。</p></section>
    <section class="card">
      <div class="section-head"><div><h2>纯文本预览</h2><p class="muted">收件人无法显示 HTML 时会看到此版本。</p></div></div>
      <pre>{{ text }}</pre>
    </section>
    <section class="card">
      <div class="section-head"><div><h2>确认加入发送队列</h2><p class="muted">手动任务不受 changes_only 策略影响。</p></div></div>
      <form method="post" action="/manual/enqueue">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="confirmation_token" value="{{ confirmation_token }}">
        <input type="hidden" name="preview_digest" value="{{ preview_digest }}">
        <input type="hidden" name="recipient_id" value="{{ recipient_id }}">
        <input type="hidden" name="report_type" value="{{ report_type }}">
        <div class="button-row"><button type="submit">确认并加入发送队列</button><a class="button-link secondary" href="/">取消并返回</a></div>
      </form>
    </section>
    {% endif %}
  </main>
</body>
</html>
