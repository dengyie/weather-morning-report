<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重置管理员密码</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body class="auth-page">
  <main class="narrow">
    <section class="card auth-card">
      <div class="brand"><span class="brand-mark" aria-hidden="true">W</span><div><p class="eyebrow">安全恢复</p><h1>重置管理员密码</h1></div></div>
      <p class="muted">为了保护服务配置，密码只能通过服务器本地 CLI 重置。</p>
      <label>本机部署</label>
      <pre>weather-report admin reset-password</pre>
      <label style="display:block;margin-top:18px">Docker 部署</label>
      <pre>docker compose run --rm setup admin reset-password</pre>
      <p class="auth-footer"><a class="button-link secondary" href="/login">返回登录</a></p>
    </section>
  </main>
</body>
</html>
