name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          path: weather-morning-report
      - name: Checkout OpenPet
        uses: actions/checkout@v6
        with:
          repository: dengyie/OpenPet
          ref: codex/plugin-service-health-checks
          path: OpenPet
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: weather-morning-report/package-lock.json
      - name: Install plugin dependencies
        run: npm ci
        working-directory: weather-morning-report
      - name: Install OpenPet dependencies
        run: npm install
        working-directory: OpenPet
      - name: Test plugin
        run: npm test
        working-directory: weather-morning-report
      - name: Build plugin
        run: npm run build
        working-directory: weather-morning-report
      - name: Lint plugin artifact
        run: npm run lint
        working-directory: weather-morning-report
      - name: Typecheck plugin scripts
        run: npm run typecheck
        working-directory: weather-morning-report
      - name: Package plugin
        run: npm run package:plugin
        working-directory: weather-morning-report
      - name: Validate plugin zip with OpenPet
        run: npm run validate:plugin -- ../weather-morning-report/release/weather-morning-report.openpet-plugin.zip
        working-directory: OpenPet
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/weather-morning-report.openpet-plugin.zip --generate-notes --title "$GITHUB_REF_NAME"
        working-directory: weather-morning-report
